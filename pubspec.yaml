name: hadithi_ai
description: "HadithiAI is a modern storytelling platform designed to preserve and celebrate African oral traditions through the power of Generative AI"

publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  provider: ^6.1.5+1
  dio: ^5.9.2
  web_socket_channel: ^3.0.3
  lucide_icons_flutter: ^3.1.10
  flutter_svg: ^2.2.4
  flutter_markdown: ^0.7.7+1
  shimmer: ^3.0.0
  intl: ^0.20.2
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.2
  flutter_pcm_sound: ^3.3.3
  record: ^6.2.0
  camera: ^0.11.0+2
  image: ^4.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  change_app_package_name: ^1.5.0

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21
  remove_alpha_ios: true

  adaptive_icon_background: "#FF63391C"
  adaptive_icon_foreground: "assets/images/logo.png"

  # web:
  #   generate: true
  #   image_path: "assets/images/logo.png"
  #   background_color: "#FF63391C"
  #   theme_color: "#FF9E6B4A"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/hero.png
    - assets/images/background.svg

  fonts:
    - family: Hanalei
      fonts:
        - asset: assets/fonts/Hanalei-Regular.ttf
    - family: Fredoka
      fonts:
        - asset: assets/fonts/Fredoka-Regular.ttf
        - asset: assets/fonts/Fredoka-SemiBold.ttf
          weight: 600
